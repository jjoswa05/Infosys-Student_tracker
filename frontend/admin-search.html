<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search & Filter – Admin – CompanyConnect</title>
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand" style="text-decoration:none;"><div class="brand-hex">⬡</div><div><div class="brand-name">CompanyConnect</div><div class="brand-sub">Admin Panel</div></div></a>
    <div class="nav-links"><span id="navAdmin" style="color:rgba(255,255,255,0.7);font-size:13px;"></span><a href="admin-login.html" onclick="DB.set('currentAdmin',null)" class="btn-nav">Logout</a></div>
  </nav>
  <div class="app-layout">
    <aside class="sidebar"><div class="sidebar-section"><div class="sidebar-label">Admin Menu</div><div id="sidebarLinks"></div></div></aside>
    <main class="main-content">
      <div class="page-header anim"><div class="breadcrumb">Admin / <span>Search & Filter</span></div><h1>Search & Filter</h1><p>Find students by department, year, program type, and status.</p></div>

      <!-- FILTER CARD -->
      <div class="card anim anim-1 mb-4">
        <div class="card-header"><div class="card-title">Filters</div><button class="btn btn-sm btn-outline" onclick="clearFilters()">Clear All</button></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
          <div class="form-group" style="margin:0;">
            <label class="form-label">Department</label>
            <select id="fDept" class="form-control">
              <option value="">All Departments</option>
              <option>CSE</option><option>IT</option><option>AML</option><option>ADS</option>
              <option>ECE</option><option>EEE</option><option>EIE</option><option>Bio</option><option>Chem</option><option>Mech</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">Batch</label>
            <select id="fBatch" class="form-control">
              <option value="">All Batches</option>
              <option>2022-26</option><option>2023-27</option><option>2024-28</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">Program Type</label>
            <select id="fProgType" class="form-control">
              <option value="">All Types</option>
              <option>Training</option><option>Internship</option><option>Certification</option><option>Workshop</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">Program</label>
            <select id="fProg" class="form-control">
              <option value="">All Programs</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">Completion Status</label>
            <select id="fStatus" class="form-control">
              <option value="">All Status</option>
              <option>Just onboarded, yet to start</option>
              <option>Doing</option>
              <option>Completed</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">Verification</label>
            <select id="fVerify" class="form-control">
              <option value="">Any</option>
              <option>Submitted</option>
              <option>Under Review</option>
              <option>Verified</option>
              <option>Rejected</option>
              <option>Need Re-upload</option>
            </select>
          </div>
        </div>
        <div style="margin-top:16px;">
          <button class="btn btn-primary" onclick="runFilter()">🔍 Search</button>
        </div>
      </div>

      <!-- RESULTS -->
      <div class="card anim anim-2">
        <div class="card-header"><div class="card-title">Results (<span id="rCount">—</span>)</div></div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>Student</th><th>Reg No</th><th>Dept</th><th>Batch</th><th>Program</th><th>Type</th><th>Status</th><th>Verification</th><th>Reg ID</th><th>Enrolled</th></tr></thead>
            <tbody id="resultTable"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="shared.js"></script>
  <script>
    const admin = requireAdmin();
    if (admin) {
      document.getElementById('navAdmin').textContent = admin.name;
      document.getElementById('sidebarLinks').innerHTML = buildAdminNav('admin-search.html');
      const programs = DB.getArr('programs');
      const sel = document.getElementById('fProg');
      programs.forEach(p => { sel.innerHTML += `<option value="${p.name}">${p.name}</option>`; });
      runFilter();
    }

    function runFilter() {
      const dept = document.getElementById('fDept').value;
      const batch = document.getElementById('fBatch').value;
      const progType = document.getElementById('fProgType').value;
      const prog = document.getElementById('fProg').value;
      const status = document.getElementById('fStatus').value;
      const verify = document.getElementById('fVerify').value;

      let parts = DB.getArr('participation').filter(p =>
        (!dept || p.dept===dept) &&
        (!batch || p.year===batch) &&
        (!progType || p.programType===progType) &&
        (!prog || p.program===prog) &&
        (!status || p.status===status) &&
        (!verify || p.verification===verify)
      );

      document.getElementById('rCount').textContent = parts.length;
      const tbody = document.getElementById('resultTable');
      if (parts.length===0) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--text3);">No results found.</td></tr>';
        return;
      }
      tbody.innerHTML = parts.map(p => `<tr>
        <td class="td-name">${p.name}</td>
        <td class="td-mono">${p.studentEmail?.split('@')[0]||'—'}</td>
        <td><span class="badge badge-training">${p.dept}</span></td>
        <td class="td-mono">${p.year}</td>
        <td style="font-size:12px;max-width:180px;">${p.program}</td>
        <td>${typeBadge(p.programType)}</td>
        <td>${badgeHTML(p.status)}</td>
        <td>${badgeHTML(p.verification)}</td>
        <td class="td-mono">${p.regId}</td>
        <td class="td-mono">${formatDate(p.enrollDate)}</td>
      </tr>`).join('');
    }

    function clearFilters() {
      ['fDept','fBatch','fProgType','fProg','fStatus','fVerify'].forEach(id => document.getElementById(id).value='');
      runFilter();
    }
  </script>
</body>
</html>
