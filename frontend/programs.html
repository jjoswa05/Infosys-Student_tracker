<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Programs – CompanyConnect</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .prog-cards { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; }
    .pc { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow); }
    .pc-top { padding: 20px 24px 16px; }
    .pc-bottom { padding: 16px 24px 20px; border-top: 1px solid var(--border); background: var(--surface2); display: flex; gap: 10px; }
    .pc-name { font-family: var(--font-head); font-size: 17px; font-weight: 700; margin: 10px 0 6px; }
    .pc-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .pc-meta { display: flex; gap: 16px; margin-top: 12px; }
    .pc-meta-item { font-size: 11px; font-family: var(--font-mono); color: var(--text3); }
    .pc-meta-item strong { color: var(--text2); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand" style="text-decoration:none;"><div class="brand-hex">⬡</div><div><div class="brand-name">CompanyConnect</div><div class="brand-sub">Infosys Springboard Tracker</div></div></a>
    <div class="nav-links"><span id="navUser" style="color:rgba(255,255,255,0.7);font-size:13px;"></span><a href="login.html" onclick="DB.set('currentUser',null)" class="btn-nav">Logout</a></div>
  </nav>
  <div class="app-layout">
    <aside class="sidebar"><div class="sidebar-section"><div class="sidebar-label">Student Menu</div><div id="sidebarLinks"></div></div></aside>
    <main class="main-content">
      <div class="page-header anim"><div class="breadcrumb">Student / <span>Programs</span></div><h1>Available Programs</h1><p>Browse and enroll in Infosys Springboard programs.</p></div>
      <div class="prog-cards" id="progCards"></div>
    </main>
  </div>
  <script src="shared.js"></script>
  <script>
    const user = requireStudent();
    if (user) {
      document.getElementById('navUser').textContent = user.name;
      document.getElementById('sidebarLinks').innerHTML = buildStudentNav('programs.html');
      const programs = DB.getArr('programs');
      const typeColors = {Training:'#ede9fe|#5b21b6',Internship:'#dbeafe|#1d4ed8',Certification:'#d1fae5|#047857',Workshop:'#fef3c7|#92400e'};
      document.getElementById('progCards').innerHTML = programs.map(p => {
        const [bg, color] = (typeColors[p.type]||'#f1f5f9|#475569').split('|');
        return `<div class="pc anim anim-1">
          <div class="pc-top">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span class="badge" style="background:${bg};color:${color};">${p.type}</span>
              <span class="text-mono">${p.duration}</span>
            </div>
            <div class="pc-name">${p.name}</div>
            <div class="pc-desc">${p.desc}</div>
            <div class="pc-meta">
              <div class="pc-meta-item"><strong>Start:</strong> ${formatDate(p.start)}</div>
              <div class="pc-meta-item"><strong>End:</strong> ${formatDate(p.end)}</div>
              <div class="pc-meta-item"><strong>Eligibility:</strong> ${p.eligibility}</div>
            </div>
          </div>
          <div class="pc-bottom">
            <a href="participation.html?prog=${encodeURIComponent(p.name)}" class="btn btn-primary">Enroll Now</a>
            <a href="upload.html" class="btn btn-outline">Upload Proof</a>
          </div>
        </div>`;
      }).join('');
    }
  </script>
</body>
</html>
