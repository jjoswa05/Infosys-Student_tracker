<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – CompanyConnect</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    body { background: linear-gradient(135deg, #0e0a2e 0%, #1a1060 50%, #0e0a2e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .auth-box { background: #fff; border-radius: 24px; box-shadow: 0 30px 80px rgba(0,0,0,0.4); width: 100%; max-width: 440px; overflow: hidden; }
    .auth-top { background: linear-gradient(135deg, #1e1060, #3b28cc); padding: 32px 36px 28px; }
    .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .auth-logo-hex { width: 40px; height: 40px; background: rgba(255,255,255,0.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .auth-logo-name { font-family: var(--font-head); font-size: 18px; font-weight: 800; color: #fff; }
    .auth-logo-sub { font-size: 11px; color: rgba(255,255,255,0.5); font-family: var(--font-mono); }
    .auth-top h2 { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: #fff; }
    .auth-top p { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 4px; }
    .auth-body { padding: 32px 36px; }
    .admin-roles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .role-chip { padding: 10px; border: 2px solid var(--border2); border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .role-chip.active { border-color: var(--primary); background: rgba(59,40,204,0.06); }
    .role-chip .role-icon { font-size: 22px; }
    .role-chip .role-name { font-size: 12px; font-weight: 600; color: var(--text2); margin-top: 4px; }
    .auth-footer { text-align: center; padding: 0 36px 28px; font-size: 13px; color: var(--text3); }
    .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="auth-top">
      <div class="auth-logo">
        <div class="auth-logo-hex">⬡</div>
        <div><div class="auth-logo-name">CompanyConnect</div><div class="auth-logo-sub">Admin Portal</div></div>
      </div>
      <h2>Admin Login</h2>
      <p>Placement Coordinator &amp; Department Faculty</p>
    </div>
    <div class="auth-body">
      <div id="alertBox"></div>
      <label class="form-label" style="margin-bottom:10px;">Login as:</label>
      <div class="admin-roles">
        <div class="role-chip active" onclick="selectRole(this,'coordinator')">
          <div class="role-icon">🎓</div>
          <div class="role-name">Placement Coordinator</div>
        </div>
        <div class="role-chip" onclick="selectRole(this,'faculty')">
          <div class="role-icon">👩‍🏫</div>
          <div class="role-name">Dept. Faculty</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email <span class="req">*</span></label>
        <input type="email" id="adminEmail" class="form-control" placeholder="admin@stjosephs.ac.in"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password <span class="req">*</span></label>
        <input type="password" id="adminPass" class="form-control" placeholder="Enter password"/>
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="doAdminLogin()">Login as Admin →</button>
      <p style="text-align:center;margin-top:14px;font-size:12px;color:var(--text3);">
        Coordinator: admin@stjosephs.ac.in / admin123<br>
        Faculty: faculty@stjosephs.ac.in / faculty123
      </p>
    </div>
    <div class="auth-footer"><a href="index.html">← Back to Home</a> &nbsp;|&nbsp; <a href="login.html">Student Login</a></div>
  </div>
  <script src="shared.js"></script>
  <script>
    let selectedRole = 'coordinator';
    function selectRole(el, role) {
      document.querySelectorAll('.role-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      selectedRole = role;
    }
    function doAdminLogin() {
      const email = document.getElementById('adminEmail').value.trim();
      const pass = document.getElementById('adminPass').value;
      if (!email || !pass) return showAlert('alertBox','Please fill all fields.','error');
      const admins = DB.getArr('admins');
      const admin = admins.find(a => a.email===email && a.pass===pass);
      if (!admin) return showAlert('alertBox','Invalid admin credentials.','error');
      DB.set('currentAdmin', admin);
      showAlert('alertBox','Login successful! Redirecting...','success');
      setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
    }
  </script>
</body>
</html>
